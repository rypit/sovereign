# Sovereign stack — a working starter you can boot with `sovereign up`.
#
#   uv run sovereign up            # boots this file, then runs in the foreground
#   Ctrl+C                         # graceful reverse-order shutdown
#
# On boot it writes .sovereign/manifest.json (resolved stack) and
# .sovereign/state.json (what's running). `up` blocks and supervises until you
# stop it (that's expected — native processes die if the parent exits).
#
# As shipped this boots two services:
#   - searxng    : a SearXNG metasearch container. FIRST RUN PULLS THE IMAGE.
#   - open_webui : a real Open WebUI container. FIRST RUN PULLS THE IMAGE
#                     (~3-4 GB, one time). Want an instant test with no download?
#                     Delete the open_webui block below.
#
# Both are `base_type: docker` — a generic container runner. The Docker
# daemon is implicit infrastructure: each docker service verifies it's
# reachable on its own, so there's no separate engine entry or dependency to
# declare.

version: "1.1"

resources:
  max_unified_memory_gb: 128     # adjust to your machine
  safety_margin_gb: 8
  default_priority: medium

services:
