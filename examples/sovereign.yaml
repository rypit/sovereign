# ---------------------------------------------------------------------------
# Add a native inference engine once you have a GGUF model on disk.
# `llama-server` is already installed (brew llama.cpp). Set model, uncomment,
# add `llama_heavy_v1` to open_webui's dependencies, and uncomment the
# OPENAI_API_BASE_URL line above to auto-wire the UI to it.
# ---------------------------------------------------------------------------
#   - name: llama_heavy_v1
#     base_type: llama_cpp
#     priority: critical
#     health_check:
#       type: http
#       endpoint: /health
#       port: 11435
#       timeout_seconds: 120
#     config:
#       model: "~/models/your-model.gguf"   # <-- point at a real GGUF ...
#       # ... or a HuggingFace repo id, e.g. "ggml-org/gemma-3-1b-it-GGUF[:Q4_K_M]" —
#       # Sovereign pre-downloads it (DOWNLOADING state, byte progress in the dashboard).
#       gpu_layers: 999            # offload all layers to Metal
#       context_size: 8192
#       max_parallel: 2
#       host: 127.0.0.1
#     dependencies: []

# ---------------------------------------------------------------------------
# Or use the MLX engine instead (native, Apple MLX). `mlx-lm` ships with the
# project (a dependency), so `uv sync` provides mlx_lm.server — no extra install.
# `model` takes a local MLX dir or a HuggingFace repo id (downloaded on first run).
# ---------------------------------------------------------------------------
  - name: mlx_heavy
    base_type: mlx_lm
    priority: critical
    health_check:
      type: http
      endpoint: /health
      port: 8080
      timeout_seconds: 120
    config:
      model: "mlx-community/Qwen3-Coder-Next-8bit"
      prompt_cache_size: 32768
      prompt_cache_bytes: 17179869184
      max_tokens: 8192
      trust_remote_code: true
      host: 127.0.0.1
      temp: 0
    dependencies: []
