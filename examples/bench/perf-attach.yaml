version: "1"

# Attach-mode perf sweep: measures whatever stack is already up under
# `sovereign up -f sovereign.yaml` (or the variant file listed below) without
# booting or stopping anything. Run it, then run it again — completed cells
# are skipped (content-addressed by stack + seed + trial count).
stacks:
  - sovereign.yaml

trials: 3
seed: 0
mode: attach

thresholds:
  min_tok_s: 5
  max_ttft_ms: 2000
