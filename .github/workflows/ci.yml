name: CI

on:
  push:
    branches: [main]
  pull_request:

# The product targets macOS/Apple Silicon, but the hermetic suite runs on any
# platform (everything external is mocked) — so the fast/cheap checks run on
# ubuntu, one macos-14 job keeps the real-platform hermetic signal (where
# mlx-lm resolves and imports), and an opt-in smoke job actually boots a model.
jobs:
  test:
    name: test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --dev --all-extras

      # Coverage is a visibility report, not a gate: the job fails on test
      # failures only, never on a coverage number.
      - name: make coverage
        run: make coverage

  test-macos:
    name: test (macos arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --dev --all-extras

      - name: make test
        run: make test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --dev --all-extras

      - name: make lint
        run: make lint

      - name: make arch
        run: make arch

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --dev --all-extras

      - name: make typecheck
        run: make typecheck

  smoke:
    name: smoke (real engine boots, macos arm64)
    runs-on: macos-14
    # Non-blocking for the first iteration: real-model boots depend on
    # the Hub and runner capacity — flakiness must not gate merges yet.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.12"

      # llama_cpp runs the native llama-server binary (ADR 0007), provisioned
      # from the manager's Brewfile; mlx-lm stays an embedded binding provided
      # by `uv sync` on darwin/arm64.
      - name: Install llama-server
        run: brew install llama.cpp

      - name: Cache HF models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-${{ runner.os }}-qwen2.5-0.5b-gguf-q2k-mlx-4bit
          restore-keys: |
            hf-cache-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --locked --dev --all-extras

      - name: Integration smoke test
        run: uv run pytest -m integration tests/integration -v
