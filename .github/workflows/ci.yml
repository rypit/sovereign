name: CI

on:
  push:
    branches: [main]
  pull_request:

# The product targets macOS/Apple Silicon exclusively (native Metal/MLX), so CI
# runs entirely on a macOS arm64 runner — the real platform, where mlx-lm
# resolves and imports.
jobs:
  test:
    name: test (macos arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: make test
        run: make test

  lint:
    name: lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: make lint
        run: make lint

  typecheck:
    name: typecheck
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: make typecheck
        run: make typecheck
